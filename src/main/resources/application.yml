server:
  port: 8080
  address: 0.0.0.0
  tomcat:
    max-part-count: 100

logging:
  file:
    name: ./logs/ecommerce_app.log
  logback:
    rollingPolicy:
      max-file-size: 50MB
      max-history: 7
      file-name-pattern: ${logging.file.name}.%d{yyyy-MM-dd}.%i.log
  level:
    org:
      springframework:
        security: info
        # Transaction management
#        transaction: ERROR
#        orm:
#          jpa: ERROR
#      hibernate:
#        SQL: ERROR
#        type:
#          descriptor:
#            sql:
#              BasicBinder: ERROR
#        engine:
#          transaction:
#            internal:
#              transactionImpl: TRACE
#          jdbc:
#            spi:
#              SqlExceptionHelper: ERROR

    web: info
    root: info

spring:
  application:
    name: ECOMMERCE_APP
  profiles:
    active: dev
  devtools:
    restart:
      enabled: false
      livereload: false
  main:
    allow-bean-definition-overriding: true
  jackson:
    serialization:
      fail-on-empty-beans: false
    deserialization:
      fail-on-unknown-properties: false
  datasource:
    url: jdbc:postgresql://localhost:5432/ecommerce
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

    hikari:
      # PostgreSQL-specific settings
      connection-timeout: 10000
      maximum-pool-size: 20  # Smaller for PostgreSQL
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1800000
      leak-detection-threshold: 60000  # Lower for PostgreSQL
      connection-test-query: SELECT 1

      # PostgreSQL optimization
      data-source-properties:
        # PostgreSQL specific
        socketTimeout: 30
        loginTimeout: 10
        tcpKeepAlive: true
        preferQueryMode: simple
        reWriteBatchedInserts: true
        preparedStatementCacheQueries: 256
        preparedStatementCacheSizeMiB: 5

  servlet:
    multipart:
      enabled: true
      max-file-size: "100MB"
      max-request-size: "100MB"

  jpa:
    hibernate:
      ddl-auto: update
      bytecode:
        provider: none
        use_reflection_optimizer: false
      properties:
        enable_lazy_load_no_trans: false  # IMPORTANT: Prevents lazy loading outside transactions
        default_batch_fetch_size: 20      # Optimizes batch loading
        jdbc:
          batch_size: 50                 # ← match with reWriteBatchedInserts
          fetch_size: 50
    show-sql: true
    generate-ddl: true
    open-in-view: false
  #    properties:
  #      hibernate:
  #        format_sql: true
  #        use_sql_comments: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: saochanny9944@gmail.com
    password: zyzjnkfvbkistybw
    properties:
      mail:
        smtp:
          auth: true
          connection-timeout: 5000
          timeout: 5000
          write-timeout: 5000
          starttls.enable: true

  engine:
    template:
      prefix: classpath:/
      suffix: .html

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
  api-docs:
    enabled: true

app:
  baseUrl: http://localhost:8080
  jwt:
    secretKey: jeBCNE3Lw9gtfS1MCHxmvzkZuYys1LR5MBMKi6Ll5tE=
    access-expired-in-minute: 360
    refresh-expired-in-minute: 900
  storage:
    upload: ./storage/upload

  # Custom I18n Configuration
  i18n:
    basename: i18n/messages
    default-locale: en
    supported-locales:
      - en
      - es
      - fr
      - km
    param-name: lang
    cache-seconds: -1 # Disable cache in dev for hot reload

  mail:
    from: online.store@gmail.com
    from-name: "Online Store"
    frontend-url: http://localhost:3000

# Bakong (NBC Cambodia) Open API
bakong:
  api:
    #base-url: https://api-bakong.nbc.gov.kh       # Production
    base-url: https://api-sandbox.nbc.gov.kh    # Sandbox
    token: ""   # JWT from POST /v1/verify (see Bakong API setup)
  app:
    icon-url: https://yourapp.com/icon.png
    name: Channy Shop

# Stripe
stripe:
  secret-key: sk_test_XXXXXXXXXXXXXXXXXXXX         # Replace with your key
  webhook-secret: whsec_XXXXXXXXXXXXXXXXXXXX       # From Stripe Dashboard → Webhooks
  currency: usd

management:
  endpoints:
    web:
      exposure:
        include: health

  endpoint:
    health:
      show-details: never